<!--Primera Alternativa de Carrito -->
<div
  class="carrito"
  onclick="toggleCarrito()"
  style="font-size: 1.2rem; display: flex; align-items: center; gap: 8px"
>
  <i class="fas fa-shopping-basket" style="font-size: 1.8rem"></i>
  <span
    id="carrito-count"
    style="
      background: #ff4d4d;
      color: white;
      border-radius: 50%;
      padding: 2px 8px;
      font-size: 0.9rem;
    "
    >0</span
  >
</div>

<aside id="sidebarCarrito" class="sidebar-carrito">
  <div class="sidebar-header">
    <h3>🛒 Tu Pedido</h3>
    <button onclick="toggleCarrito()" class="btn-cerrar">✕</button>
  </div>

  <ul id="lista-carrito"></ul>

  <div class="footer-carrito">
    <div
      id="total-carrito"
      style="font-weight: bold; margin-bottom: 15px; text-align: center"
    ></div>

    <div id="paso-1-carrito">
      <button
        onclick="vaciarCarrito()"
        style="
          background: none;
          border: 1px solid #ff4d4d;
          color: #ff4d4d;
          width: 100%;
          padding: 8px;
          border-radius: 5px;
          margin-bottom: 10px;
          cursor: pointer;
        "
      >
        <i class="fas fa-trash-alt"></i> Vaciar Carrito
      </button>

      <button
        onclick="mostrarFormulario()"
        style="
          width: 100%;
          background: #ff914d;
          color: white;
          border: none;
          padding: 12px;
          border-radius: 8px;
          font-weight: bold;
          cursor: pointer;
        "
      >
        Siguiente: Datos de Envío <i class="fas fa-arrow-right"></i>
      </button>
    </div>

    <div id="paso-2-datos" style="display: none">
      <h4
        style="margin-bottom: 10px; border-bottom: 1px solid #ddd; color: #333"
      >
        Datos de Entrega
      </h4>

      <input
        type="text"
        id="nombre-cliente"
        placeholder="Nombre completo"
        style="
          width: 100%;
          margin-bottom: 10px;
          padding: 10px;
          border-radius: 8px;
          border: 1px solid #ccc;
          box-sizing: border-box;
        "
      />

      <input
        type="text"
        id="direccion-cliente"
        placeholder="Dirección y Barrio"
        style="
          width: 100%;
          margin-bottom: 10px;
          padding: 10px;
          border-radius: 8px;
          border: 1px solid #ccc;
          box-sizing: border-box;
        "
      />

      <label
        style="
          display: block;
          margin-bottom: 5px;
          font-size: 0.8rem;
          color: #666;
        "
        >Método de Pago:</label
      >
      <select
        id="metodo-pago"
        style="
          width: 100%;
          margin-bottom: 15px;
          padding: 10px;
          border-radius: 8px;
          border: 1px solid #ccc;
          background: white;
        "
      >
        <option value="Efectivo">💵 Efectivo (Contra entrega)</option>
        <option value="Nequi">📱 Nequi</option>
      </select>

      <button
        onclick="enviarPedidoWhatsApp()"
        style="
          width: 100%;
          background-color: #25d366;
          color: white;
          border: none;
          padding: 12px;
          border-radius: 8px;
          font-weight: bold;
          cursor: pointer;
        "
      >
        <i class="fab fa-whatsapp"></i> Finalizar Compra
      </button>

      <button
        onclick="volverAProductos()"
        style="
          background: none;
          border: none;
          color: #666;
          width: 100%;
          margin-top: 10px;
          cursor: pointer;
          font-size: 0.8rem;
        "
      >
        ← Modificar Pedido
      </button>
    </div>
  </div>
</aside>

  <div class="sidebar-header">
    <h3>🛒 Tu Pedido</h3>
    <button onclick="toggleCarrito()" class="btn-cerrar">✕</button>
  </div>

  <ul id="lista-carrito"></ul>

  <div class="footer-carrito">

      </button>
    </div>
  </div>
