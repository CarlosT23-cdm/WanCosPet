<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WanCos Pet - Juguetes Perros</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="./img_sitio/Favicon/Extra_favicon_io/favicon-16x16.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="estilos.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <h1>
        <img
          src="./img_sitio/Favicon/Extra_favicon_io/favicon-32x32.png"
          class="logo-titulo"
          alt="Logo"
        />
        WanCos Pet
      </h1>
      <nav id="mainNav"></nav>
    </header>

    <div
      class="carrito"
      onclick="toggleCarrito()"
      style="font-size: 1.2rem; display: flex; align-items: center; gap: 8px"
    >
      <i class="fas fa-shopping-basket" style="font-size: 1.8rem"></i>
      <span
        id="carrito-count"
        style="
          background: #ff4d4d;
          color: white;
          border-radius: 50%;
          padding: 2px 8px;
          font-size: 0.9rem;
        "
        >0</span
      >
    </div>

    <aside id="sidebarCarrito" class="sidebar-carrito">
      <div class="sidebar-header">
        <h3>🛒 Tu Pedido</h3>
        <button onclick="toggleCarrito()" class="btn-cerrar">✕</button>
      </div>

      <ul id="lista-carrito"></ul>

      <div class="footer-carrito">
        <div id="total-carrito"></div>
        <div class="footer-carrito">
          <div id="total-carrito"></div>

          <button
            onclick="vaciarCarrito()"
            style="
              background: none;
              border: 1px solid #ff4d4d;
              color: #ff4d4d;
              width: 100%;
              padding: 8px;
              border-radius: 5px;
              margin-bottom: 10px;
              cursor: pointer;
            "
          >
            <i class="fas fa-trash-alt"></i> Vaciar Carrito
          </button>

          <button onclick="enviarPedidoWhatsApp()" class="btn-whatsapp">
            <i class="fab fa-whatsapp"></i> Finalizar Compra
          </button>
        </div>
      </div>
    </aside>

    <section class="hero">
      <h2>Juguetes para Perros</h2>
      <div class="tagline">¡Diversión asegurada para tu mejor amigo!</div>
    </section>
    <div class="buscador-container" style="text-align: center; margin: 20px">
      <input
        type="text"
        id="buscador"
        placeholder="🔍 Busca en esta categoría..."
        style="
          padding: 12px;
          width: 80%;
          max-width: 500px;
          border-radius: 25px;
          border: 2px solid #ff914d;
        "
      />
    </div>

    <div id="lista-busqueda" class="productos-grid productos-container"></div>
    <section class="seccion-favoritos">
      <h2 style="text-align: center; font-size: 1.5rem; color: #ff914d">
        🐾 Tus Favoritos
      </h2>
      <div id="contenedor-favoritos" class="favoritos-grid">
        <p class="fav-vacio-msj">
          Selecciona tus favoritos dando "me gusta" ❤️
        </p>
      </div>
    </section>
    <main>
      <section id="productos-section">
        <div id="lista-productos" class="grid-productos"></div>
      </section>
    </main>

    <footer class="footer-wancos">
      <div class="footer-container">
        <div class="footer-logo">
          <img
            src="./img_sitio/Favicon/Extra_favicon_io/favicon-16x16.png"
            class="logo-img"
            alt="Logo"
          />
          <span>WanCos Pet</span>
        </div>

        <div class="footer-copy">
          <p>
            © 2026 WanCos Pet 🐾 Bogotá D.C, Colombia <br />
            <span>Todos los derechos reservados</span>
          </p>
        </div>
        <div class="footer-social">
          <a
            href="https://www.facebook.com/profile.php?id=61581891114782"
            target="_blank"
            ><i class="fab fa-facebook"></i
          ></a>
          <a href="https://www.instagram.com/wancospet/" target="_blank"
            ><i class="fab fa-instagram"></i
          ></a>
          <a
            href="https://www.tiktok.com/@wancos.pet?is_from_webapp=1&sender_device=pc"
            target="_blank"
            ><i class="fab fa-tiktok"></i
          ></a>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script src="datos.js"></script>
    <script src="logica.js"></script>
    <script src="menu.js"></script>
  </body>
</html>
